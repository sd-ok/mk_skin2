<style type="text/css">

/* class-list */

/* best-item */
.slide-section {
    max-width: 1400px;
    padding: 100px 0;
}


.slide-section .swiper-pagination{
    width: 240px !important;
    left: calc(50% - 120px) !important;
    background: rgba(18, 18, 18, 0.2);
    height: 2px !important;
    position: unset;
    margin: 60px auto 0;}

.slide-section .swiper-pagination .swiper-pagination-progressbar-fill {
    background: rgba(18, 18, 18, 1)
}

.slide-section .arrowBox{
    position: absolute;
    right: 0;
    bottom: 30px;}

.slide-section .arrowBox .l-line {
    display: inline-block;
    vertical-align: top;
    width: 1px;
    height: 12px;
    background: #ccc2bf;
    margin: 7px 15px 0;
}


.slide-section .swiper-button-prev:after,.slide-section .swiper-button-next:after {
    font-size: 14px;
    font-family: var(--base-font);
    color: var(--point-color);
    text-transform: capitalize !important;
    font-weight: 500;
}


.slide-section .arrowBox .swiper-button-next{margin-top:0;width: auto;height: unset; position: unset;display: inline-block; vertical-align: top;}
.slide-section .arrowBox .swiper-button-next span{float: right; margin-left: 10px;}
.slide-section .arrowBox .swiper-button-next span:after{}
.slide-section .arrowBox .swiper-button-prev{margin-top:0; width: auto; height: unset;position: unset;display: inline-block; vertical-align: top;}
.slide-section .arrowBox .swiper-button-prev span{margin-right: 12px;}
.slide-section .arrowBox .swiper-button-prev span:after{}

.slide-section .cateTit{padding:0;text-align:left}
.slide-section .cateTit h3{
    font-size: 32px;
    color: #5F4541;
    font-weight: 600;
    font-family: var(--base-font);
    padding-bottom: 24px;}

.slide-section .item-wrap .item-cont .item-list .thumb{width:100%}


/* .item-sort */
.item-sort {position: relative; margin-bottom: 25px; margin-top: 20px;}
.item-sort .ea {
    font-size: 14px;
    text-align: left;
    color: #5F4541;
    height: 30px;
    line-height: 30px;}

.item-sort .ea strong {}
.item-sort .sort {position:absolute; top:50%; right:0; z-index:1; -webkit-transform:translate(0,-50%); -ms-transform:translate(0,-50%); transform:translate(0,-50%);}
.item-sort .sort select {width:140px; height:30px; line-height:30px; font-size:13px; font-weight:400; border:0; border-bottom:1px solid #000; background:url(http://xexymix.jpg3.kr/xexymix/PL/img/select_arrow.png) no-repeat 95% 50%; background-size:10%;
    -webkit-appearance: none; /* 화살표 없애기 for chrome*/
    -moz-appearance: none;    /* 화살표 없애기 for firefox*/
    appearance: none;         /* 화살표 없애기 공통*/
}
.item-sort .sort select::-ms-expand {
    display: none;  /* 화살표 없애기 for IE10, 11*/
}
.sort-menu { position: absolute; top: 50%; right: 0; z-index: 5; -webkit-transform: translate(0,-50%); -ms-transform: translate(0,-50%); transform: translate(0,-50%); }
.sort-menu .sort-btn {
    cursor: pointer;
    display: block;
    font-size: 13px;
    width: 98px;
    border: 1px solid #E1D9D7;
    border-radius: 4px;
    background: #fff;
    padding: 6px 10px;
    line-height: 17px;
    font-weight: 400;
    color: #121212;}

.sort-menu .sort-btn:after {
    content: "";
    display: block;
    width: 7px;
    height: 7px;
    position: absolute;
    right: 12px;
    top: 9px;
    transform: rotate(45deg);
    border-bottom: 1px solid #121212;
    border-right: 1px solid #121212;
    transition: 0.4s;}


.sort-menu .sort-list {
    border: 1px solid #E1D9D7;
    border-radius: 4px;
    position: absolute;
    display: none;
    width: 120px;
    box-sizing: border-box;
    padding: 6px 10px;
    margin-top: -1px;
    background: #fff;}
.sort-menu .sort-list li { list-style: none; line-height: 30px; box-sizing: border-box; }
.sort-menu .sort-list li a {
    font-size: 13px;
    display: block;
    padding: 5px 0;}

.sort-menu .sort-list li a:hover { color: #111; }
.sort-menu .sort-btn.active:after {
    border-bottom: 1px solid #121212;
    border-right: 1px solid #121212;
    transform: rotate(-135deg);
    top: 14px;
    transition: 0.4s;}

.sort-menu .sort-list.opened { display: block; }
